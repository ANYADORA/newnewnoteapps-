<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nota — スマートノート</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
        <div id="loading-text">全ページの画像を生成中...</div>
    </div>
    <div id="toast" class="toast"></div>

    <header id="page-nav">
        <button class="nav-btn" id="prevPage"><i class="fas fa-chevron-left"></i></button>
        <div class="page-indicator">
            <input type="number" id="pageInput" min="1" value="1">
            <span id="pageTotal">/ 1</span>
        </div>
        <button class="nav-btn" id="nextPage"><i class="fas fa-chevron-right"></i></button>
        <div class="nav-spacer"></div>
        <div id="status-badge" class="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Ready</span>
        </div>
    </header>

    <div id="toolbar">
        <div class="tool-group">
            <button class="tool-btn" id="undoBtn"><i class="fas fa-rotate-left"></i></button>
            <button class="tool-btn" id="redoBtn"><i class="fas fa-rotate-right"></i></button>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group">
            <button class="tool-btn active" id="modeMove" title="移動・選択"><i class="fas fa-hand"></i></button>
            <button class="tool-btn" id="pen1Btn" title="ペン1"><i class="fas fa-pen"></i></button>
            <button class="tool-btn" id="pen2Btn" title="ペン2"><i class="fas fa-pen-fancy"></i></button>
            <button class="tool-btn" id="modeEraser" title="消しゴム"><i class="fas fa-eraser"></i></button>
        </div>
        <div id="pen-settings" class="pen-settings">
            <input type="color" id="penColor">
            <input type="range" id="penSize" min="1" max="30">
            <span id="penSizeLabel" class="pen-size-label">2px</span>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group">
            <button class="tool-btn" id="shapeLine"><i class="fas fa-minus"></i></button>
            <button class="tool-btn" id="shapeArrow"><i class="fas fa-arrow-right"></i></button>
            <button class="tool-btn" id="shapeRect"><i class="far fa-square"></i></button>
            <button class="tool-btn" id="shapeCircle"><i class="far fa-circle"></i></button>
            <button class="tool-btn" id="shapeStar"><i class="far fa-star"></i></button>
            <button class="tool-btn" id="shapeText"><i class="fas fa-font"></i></button>
        </div>
        <div class="tool-sep"></div>
        <div class="tool-group">
            <button class="tool-btn" id="imgBtn"><i class="fas fa-image"></i></button>
            <input type="file" id="imgInput" accept="image/*" hidden>
            <button class="tool-btn danger" id="delSelected" title="選択削除"><i class="fas fa-trash-alt"></i></button>
        </div>
        <div class="tool-spacer"></div>
        <div class="tool-group">
            <button class="tool-btn" id="exportAllImages" title="全ページ画像保存"><i class="fas fa-file-export"></i></button>
            <button class="tool-btn accent" id="saveFile" title="ファイル保存"><i class="fas fa-download"></i></button>
            <button class="tool-btn" id="loadBtn" title="ファイル読込"><i class="fas fa-folder-open"></i></button>
            <input type="file" id="loadFile" accept=".nota,.zip,.json" hidden>
            <button class="tool-btn special" id="openNotebookLM" title="NotebookLM"><i class="fas fa-robot"></i></button>
        </div>
    </div>

    <main id="canvas-container">
        <canvas id="c"></canvas>
    </main>

    <script src="app.js"></script>
</body>
</html>
